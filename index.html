<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Racing</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #0a0a0a; font-family: system-ui, sans-serif; }
      #app { position: fixed; inset: 0; }
      #loading {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 2rem;
        color: #fff; background: #0a0a0a; z-index: 10; transition: opacity 0.4s;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      #loading-title {
        font-size: 1.5rem; letter-spacing: 0.15em; font-weight: 300;
        text-transform: uppercase;
      }
      #loading-progress {
        width: 300px; display: flex; flex-direction: column; gap: 0.75rem;
      }
      #loading-bar-container {
        width: 100%; height: 4px; background: rgba(255,255,255,0.1);
        border-radius: 2px; overflow: hidden;
      }
      #loading-bar {
        height: 100%; background: linear-gradient(90deg, #e10600, #ff4444);
        width: 0%; transition: width 0.3s ease-out;
      }
      #loading-info {
        display: flex; justify-content: space-between; font-size: 0.875rem;
        color: rgba(255,255,255,0.6); letter-spacing: 0.05em;
      }
      #loading-stage { text-transform: capitalize; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">
      <div id="loading-title">F1 Racing</div>
      <div id="loading-progress">
        <div id="loading-bar-container">
          <div id="loading-bar"></div>
        </div>
        <div id="loading-info">
          <span id="loading-stage">Initializing</span>
          <span id="loading-percent">0%</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
