<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUD Notification Test</title>
  <link rel="stylesheet" href="/src/hud/styles.css">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: monospace;
      background: #1a1a1a;
      color: #f5f5f5;
    }
    .controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 200;
    }
    button {
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
    }
    button:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <h1>HUD Notification System Test</h1>
  <p>Click buttons to test different notification types:</p>

  <div class="controls">
    <button onclick="testInfo()">Info Notification</button>
    <button onclick="testSuccess()">Success Notification</button>
    <button onclick="testWarning()">Warning Notification</button>
    <button onclick="testError()">Error Notification</button>
    <button onclick="testMultiple()">Multiple Notifications</button>
  </div>

  <script type="module">
    import { createHud } from '/src/hud/hud.ts';

    const hud = createHud();
    document.body.appendChild(hud.root);

    window.testInfo = () => {
      hud.showNotification('This is an info notification', 'info');
    };

    window.testSuccess = () => {
      hud.showNotification('Operation completed successfully!', 'success');
    };

    window.testWarning = () => {
      hud.showNotification('Player disconnected from the race', 'warning', 5000);
    };

    window.testError = () => {
      hud.showError('Host disconnected. Returning to menu...');
    };

    window.testMultiple = () => {
      hud.showNotification('First notification', 'info');
      setTimeout(() => hud.showNotification('Second notification', 'success'), 500);
      setTimeout(() => hud.showNotification('Third notification', 'warning'), 1000);
    };

    // Auto-test on load
    setTimeout(() => {
      hud.showNotification('Notification system loaded successfully!', 'success');
    }, 500);
  </script>
</body>
</html>
